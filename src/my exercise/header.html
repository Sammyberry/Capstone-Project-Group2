<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Solar System Hero Section</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <section class="hero">

    <!-- LEFT SIDE -->
    <div class="left-content">

      <div class="logo">
        <img src="https://cdn-icons-png.flaticon.com/512/3212/3212608.png" alt="planet logo">
        <div>
          <h3>planet</h3>
          <span>explore the solar system</span>
        </div>
      </div>

      <h1>
        Explore Our Solar <br>
        System Through Data
      </h1>

      <p>
        Understand the planets not just by name, but by measurable<br>
        facts. From size and mass to gravity and density, this page<br>
        breaks down the solar system in a clear, data-driven way.
      </p>

      <div class="buttons">
        <button class="#planets" class="btn">
          Explore the Data
        </button>

        <button class="#contact" class="btn" outline>
          Contact Us
        </button>
      </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="planet-container">
      <img
        class="planet"
        src="https://images.unsplash.com/photo-1614728894747-a83421e2b9c9?q=80&w=1200&auto=format&fit=crop" alt="Planet Earth"
        />
    </div>

  </section>

</body>
</html>
